<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/neymar.jpg" class="avatar">
      <div>
        <span class="name">joãopedro</span>
        <span class="username">@caiana2026</span>
      </div>
    </div>

    <p class="post-text">
      olha minha nova postagem 🚀
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <div class="post-actions">
      <button id="deslikeBtn">Descurtir</button>
      <span id="deslikeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>slk ficou dahora! 🔥</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>deitou nessa !</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
